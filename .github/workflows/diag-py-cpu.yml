name: diag-py-cpu

# One-off diagnostic. First result was surprising: the SHARED (wheel-posture)
# build with GGML_OPENMP=OFF did NOT deadlock, while the STATIC Rust build
# reliably did. So the discriminator looks like static-vs-shared, not OpenMP.
# This run pins that down:
#   1. SHARED + GGML_OPENMP=OFF (wheel posture): run CPU whisper through the
#      ctypes Python binding N times under a watchdog -> is it RELIABLY safe, or
#      an intermittent race?
#   2. STATIC + GGML_OPENMP=OFF (control, same runner): build the C++ whisper
#      e2e and run it under an external timeout -> confirm it still HANGS here.
# If shared passes N/N and static hangs, the deadlock is static-specific and the
# Python wheels are NOT exposed.
#
# push-triggered, path-scoped. DELETE once the wheel CPU-on-Windows posture is
# decided.

on:
  push:
    branches: [rust-bindings]
    paths:
      - ".github/workflows/diag-py-cpu.yml"
      - ".github/diag/py_cpu_repro.py"

concurrency:
  group: diag-py-cpu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diag:
    name: diag-py-cpu (windows)
    runs-on: blacksmith-2vcpu-windows-2025
    timeout-minutes: 55
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Install build deps
        shell: pwsh
        run: |
          choco install ninja --no-progress -y
          vcpkg install zlib:x64-windows-static-md
          $zlibPrefix = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-static-md" -replace '\\','/'
          Add-Content $env:GITHUB_ENV "CMAKE_PREFIX_PATH=$zlibPrefix"
      - uses: ./.github/actions/fetch-canary
        with:
          hf-token: ${{ secrets.HF_TOKEN }}
      - name: 1) SHARED + GGML_OPENMP=OFF (wheel posture) — loop x12, count hangs
        shell: pwsh
        run: |
          cmake -B build-sh -G Ninja -DCMAKE_BUILD_TYPE=Release `
            -DTRANSCRIBE_BUILD_SHARED=ON -DTRANSCRIBE_USE_OPENMP=OFF `
            -DTRANSCRIBE_INSTALL=ON -DTRANSCRIBE_BUILD_TESTS=OFF `
            -DTRANSCRIBE_BUILD_EXAMPLES=OFF -DCMAKE_INSTALL_PREFIX="$PWD/install-sh"
          if ($LASTEXITCODE -ne 0) { throw "configure (shared) failed" }
          cmake --build build-sh --target install
          if ($LASTEXITCODE -ne 0) { throw "build (shared) failed" }
          Select-String -Path build-sh/CMakeCache.txt -Pattern 'GGML_OPENMP:'
          $env:PYTHONPATH = "$PWD/bindings/python/src"
          $env:TRANSCRIBE_LIBRARY = "$PWD/install-sh/bin/transcribe.dll"
          $env:WHISPER_MODEL = $env:TRANSCRIBE_SMOKE_MODEL
          $env:JFK_WAV = "$PWD/samples/jfk.wav"
          $hangs = 0
          for ($i = 1; $i -le 12; $i++) {
            uv run --no-project --python 3.11 python .github/diag/py_cpu_repro.py --timeout 45 *> "iter_$i.log"
            if ($LASTEXITCODE -ne 0) { $hangs++; Write-Host "  iter $i: HANG (exit $LASTEXITCODE)" }
            else { Write-Host "  iter ${i}: pass" }
          }
          Write-Host "===== SHARED GGML_OPENMP=OFF result: $hangs / 12 hangs ====="
          if ($hangs -gt 0) { Get-Content (Get-ChildItem iter_*.log | Select-Object -Last 1) | Select-Object -Last 30 }
          exit 0
      - name: 2) STATIC + GGML_OPENMP=OFF (control) — C++ e2e under a 90s timeout
        shell: pwsh
        run: |
          cmake -B build-st -G Ninja -DCMAKE_BUILD_TYPE=Release `
            -DTRANSCRIBE_USE_OPENMP=OFF -DTRANSCRIBE_BUILD_REAL_MODEL_TESTS=ON `
            -DTRANSCRIBE_BUILD_TESTS=ON "-DCMAKE_EXE_LINKER_FLAGS=advapi32.lib"
          if ($LASTEXITCODE -ne 0) { throw "configure (static) failed" }
          cmake --build build-st --target transcribe_whisper_e2e_smoke
          if ($LASTEXITCODE -ne 0) { throw "build (static e2e) failed" }
          Select-String -Path build-st/CMakeCache.txt -Pattern 'GGML_OPENMP:'
          $exe = (Get-ChildItem -Recurse -Filter transcribe_whisper_e2e_smoke.exe build-st | Select-Object -First 1).FullName
          $env:TRANSCRIBE_WHISPER_MODEL = $env:TRANSCRIBE_SMOKE_MODEL
          Write-Host "=== running static e2e (90s external timeout) ==="
          $p = Start-Process -FilePath $exe -PassThru -NoNewWindow
          if (-not $p.WaitForExit(90000)) {
            Write-Host "===== STATIC GGML_OPENMP=OFF result: HANG (no exit in 90s) ====="
            $p.Kill()
          } else {
            Write-Host "===== STATIC GGML_OPENMP=OFF result: exited $($p.ExitCode) (no hang) ====="
          }
          exit 0
