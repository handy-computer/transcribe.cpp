# Spec for the HF README of handy-computer/gigaam-v3-rnnt-gguf.
# Consumed by scripts/hf_cards/generate.py.

hf_repo: ai-sage/GigaAM-v3
target_repo: handy-computer/gigaam-v3-rnnt-gguf
transcribe_docs_url: https://github.com/handy-computer/transcribe.cpp/blob/main/docs/models/gigaam-v3-rnnt.md

# Upstream branch: rnnt. Each gigaam-v3 variant lives on its own
# HF branch; the SHA below pins this variant's branch revision.
upstream_commit: c7f128b
pin_date: 2026-05-12
# Upstream README lives only on the main branch (per-variant branches
# ship empty README stubs); fetch the family card from main.
upstream_card_commit: ec1dc1f

# Validation pin for the most recent upload. Updated on each release;
# older HF revisions carry whatever value was current at their upload time.
validation:
  reference: gigaam author package
  commit: 42b96d9
  date: 2026-05-12

license: mit
license_display: MIT
pipeline_tag: automatic-speech-recognition
languages:
  - ru
tags:
  - gguf
  - transcribe.cpp
  - asr
  - speech-to-text
  - gigaam
  - conformer
  - rnnt
  - russian

summary: |
  Offline Russian speech-to-text with greedy RNN-T decoding. Same 16-layer Conformer encoder as the e2e variant, fine-tuned to emit lowercased Russian with no punctuation; 33-entry character vocabulary.

default_quant_index: 2  # Q8_0

# Capability flags for the transcribe_cpp metadata block.
capabilities:
  streaming: false
  translate: false
  lang_detect: false
  timestamps: token  # none | segment | word | token

# Speedup-over-realtime (×RT) per rig/backend, from docs/models; published
# raw as rtf_<machine> in the metadata block.
perf:
  m4-max:
    metal: 110
    cpu: 27
  ryzen-4750u:
    vulkan: 25
    cpu: 9

wer:
  metadata_key: fleurs_ru
  source: FLEURS ru
  notes: |
    WER measured on the full FLEURS ru test split (775 utterances) with greedy decoding and no external LM. F32 reference baseline: 8.08%. Upstream `gigaam` author package measured on the same manifest: 9.46%; the 1.4 pp gap is upstream rejecting 5 long (>25 s) utterances with `Too long wav file, use 'transcribe_longform' method.` (counted as 100% deletion errors). On the 770-utt subset both sides decode, transcribe.cpp matches upstream exactly. ai-sage does not publish a FLEURS ru WER; this number is measured here.

quants:
  - name: F32
    filename: gigaam-v3-rnnt-F32.gguf
    size: 846 MB
    wer: 8.08%
  - name: F16
    filename: gigaam-v3-rnnt-F16.gguf
    size: 430 MB
    wer: 8.08%
  - name: Q8_0
    filename: gigaam-v3-rnnt-Q8_0.gguf
    size: 260 MB
    wer: 8.08%
  - name: Q6_K
    filename: gigaam-v3-rnnt-Q6_K.gguf
    size: 217 MB
    wer: 8.07%
  - name: Q5_K_M
    filename: gigaam-v3-rnnt-Q5_K_M.gguf
    size: 196 MB
    wer: 8.12%
  - name: Q4_K_M
    filename: gigaam-v3-rnnt-Q4_K_M.gguf
    size: 175 MB
    wer: 8.12%
