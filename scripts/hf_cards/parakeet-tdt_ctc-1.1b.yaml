# Spec for the HF README of handy-computer/parakeet-tdt_ctc-1.1b-gguf.
# Consumed by scripts/hf_cards/generate.py.

hf_repo: nvidia/parakeet-tdt_ctc-1.1b
target_repo: handy-computer/parakeet-tdt_ctc-1.1b-gguf
transcribe_docs_url: https://github.com/handy-computer/transcribe.cpp/blob/main/docs/models/parakeet-tdt_ctc-1.1b.md

upstream_commit: 675e786
pin_date: 2026-05-10

# Validation pin for the most recent upload. Updated on each release —
# older HF revisions carry whatever value was current at their upload time.
validation:
  reference: NeMo
  commit: 42528dd
  date: 2026-05-10

license: cc-by-4.0
license_display: CC-BY-4.0
pipeline_tag: automatic-speech-recognition
languages:
  - en
tags:
  - gguf
  - transcribe.cpp
  - asr
  - speech-to-text
  - parakeet
  - conformer
  - rnnt
  - tdt

summary: |
  Offline English speech-to-text with punctuation and capitalization. A 1.1B-parameter FastConformer-XL encoder with a TDT/RNNT transducer decoder (the auxiliary CTC head from the upstream hybrid checkpoint is dropped at convert time). Not a streaming model and does not translate.

default_quant_index: 2  # Q8_0

# Capability flags for the transcribe_cpp metadata block.
capabilities:
  streaming: false
  translate: false
  lang_detect: false
  timestamps: token  # none | segment | word | token

# Speedup-over-realtime (×RT) per rig/backend, from docs/models; published
# raw as rtf_<machine> in the metadata block.
perf:
  m4-max:
    metal: 125.5
    cpu: 18.5
  ryzen-4750u:
    vulkan: 11
    cpu: 5.5

wer:
  source: LibriSpeech test-clean
  notes: |
    WER measured on the full LibriSpeech test-clean split (2620 utterances) with greedy TDT/RNN-T transducer decoding and no external LM. F32 reference baseline: 1.87%. NVIDIA's self-reported number on the same split is 1.82%.

quants:
  - name: F32
    filename: parakeet-tdt_ctc-1.1b-F32.gguf
    size: 4.28 GB
    wer: 1.87%
  - name: F16
    filename: parakeet-tdt_ctc-1.1b-F16.gguf
    size: 2.15 GB
    wer: 1.87%
  - name: Q8_0
    filename: parakeet-tdt_ctc-1.1b-Q8_0.gguf
    size: 1.27 GB
    wer: 1.87%
  - name: Q6_K
    filename: parakeet-tdt_ctc-1.1b-Q6_K.gguf
    size: 1.04 GB
    wer: 1.87%
  - name: Q5_K_M
    filename: parakeet-tdt_ctc-1.1b-Q5_K_M.gguf
    size: 936 MB
    wer: 1.87%
  - name: Q4_K_M
    filename: parakeet-tdt_ctc-1.1b-Q4_K_M.gguf
    size: 825 MB
    wer: 1.91%
