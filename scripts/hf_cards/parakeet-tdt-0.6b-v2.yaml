# Spec for the HF README of handy-computer/parakeet-tdt-0.6b-v2-gguf.
# Consumed by scripts/hf_cards/generate.py.

hf_repo: nvidia/parakeet-tdt-0.6b-v2
target_repo: handy-computer/parakeet-tdt-0.6b-v2-gguf
transcribe_docs_url: https://github.com/handy-computer/transcribe.cpp/blob/main/docs/models/parakeet-tdt-0.6b-v2.md

upstream_commit: 1b149a3
pin_date: 2026-04-15

# Validation pin for the most recent upload. Updated on each release —
# older HF revisions carry whatever value was current at their upload time.
validation:
  reference: NeMo
  commit: bf0d0b7
  date: 2026-04-18

license: cc-by-4.0
license_display: CC-BY-4.0
pipeline_tag: automatic-speech-recognition
languages:
  - en
tags:
  - gguf
  - transcribe.cpp
  - asr
  - speech-to-text
  - parakeet
  - conformer
  - rnnt
  - tdt

summary: |
  Offline English speech-to-text. A 0.6B-parameter Conformer encoder with a
  TDT/RNNT transducer decoder. Takes a 16 kHz mono WAV and produces a transcript
  with optional token-level timestamps. Not a streaming model; no multilingual
  capability (see v3 for that).

default_quant_index: 2  # Q8_0

# Capability flags for the transcribe_cpp metadata block.
capabilities:
  streaming: false
  translate: false
  lang_detect: false
  timestamps: token  # none | segment | word | token

# Speedup-over-realtime (×RT) per rig/backend, hand-authored from the bench;
# published raw as rtf_<machine> in the metadata block.
perf:
  ryzen-4750u:
    cpu: 8
    vulkan: 15
  m4-max:
    cpu: 29
    metal: 175

wer:
  source: LibriSpeech test-clean
  # metadata_key: librispeech_test_clean  # names the wer_<key> field; override when scored on another corpus
  notes: |
    WER measured on the full LibriSpeech test-clean split (2620 utterances) with
    greedy transducer decoding and no external LM. F32 reference baseline: 1.68%.
    NVIDIA's self-reported number on the same split is 1.69%, so the F32 and Q8_0
    ports match the upstream reference within rounding.

quants:
  - name: F32
    filename: parakeet-tdt-0.6b-v2-F32.gguf
    size: 2.47 GB
    wer: 1.68%
  - name: F16
    filename: parakeet-tdt-0.6b-v2-F16.gguf
    size: 1.24 GB
    wer: 1.68%
  - name: Q8_0
    filename: parakeet-tdt-0.6b-v2-Q8_0.gguf
    size: 730 MB
    wer: 1.69%
  - name: Q6_K
    filename: parakeet-tdt-0.6b-v2-Q6_K.gguf
    size: 608 MB
    wer: 1.70%
  - name: Q5_K_M
    filename: parakeet-tdt-0.6b-v2-Q5_K_M.gguf
    size: 547 MB
    wer: 1.70%
  - name: Q4_K_M
    filename: parakeet-tdt-0.6b-v2-Q4_K_M.gguf
    size: 483 MB
    wer: 1.72%
