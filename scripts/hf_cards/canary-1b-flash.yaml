# Spec for the HF README of handy-computer/canary-1b-flash-gguf.
# Consumed by scripts/hf_cards/generate.py.

hf_repo: nvidia/canary-1b-flash
target_repo: handy-computer/canary-1b-flash-gguf
transcribe_docs_url: https://github.com/handy-computer/transcribe.cpp/blob/main/docs/models/canary-1b-flash.md

