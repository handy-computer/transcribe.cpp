# Spec for the HF README of handy-computer/moonshine-tiny-uk-gguf.
# Consumed by scripts/hf_cards/generate.py.

hf_repo: UsefulSensors/moonshine-tiny-uk
target_repo: handy-computer/moonshine-tiny-uk-gguf
transcribe_docs_url: https://github.com/handy-computer/transcribe.cpp/blob/main/docs/models/moonshine.md

upstream_commit: 8cf70f4
pin_date: 2026-05-12

validation:
  reference: transformers
  commit: 2b36344
  date: 2026-05-12

license: mit
license_display: MIT
pipeline_tag: automatic-speech-recognition
languages:
  - uk
tags:
  - gguf
  - transcribe.cpp
  - asr
  - speech-to-text
  - moonshine
  - useful-sensors
  - encoder-decoder

summary: |
  UsefulSensors' Moonshine tiny fine-tuned on Ukrainian. Same
  encoder-decoder transformer architecture as moonshine-tiny (27M
  parameters): consumes 16 kHz raw PCM via a three-layer Conv1d stem (no
  STFT, no mel filterbank) and emits transcript-only output. Single-language
  (uk); no translation, no language detection, no timestamps.

default_quant_index: 2  # Q8_0

metric: WER
wer:
  source: FLEURS uk test
  notes: |
    WER measured on the FLEURS-uk test split (750
    utterances) using the transcribe.cpp default decode (greedy,
    num_beams=1, max_length=192 — matching the upstream generation_config).

    UsefulSensors does not publish a per-language WER number
    for this variant. As a comparable baseline we ran the Transformers F32
    reference (`MoonshineForConditionalGeneration`, fp32 on MPS) on the
    same manifest: **18.86% WER**. The C++ F32/F16 numbers
    above match the reference within bootstrap-CI noise; Q8_0 introduces
    a small additional drift from F16 (typically within 0.1pp).

quants:
  - name: F32
    filename: moonshine-tiny-uk-F32.gguf
    size: 105 MB
    wer: 18.83%
  - name: F16
    filename: moonshine-tiny-uk-F16.gguf
    size: 57 MB
    wer: 18.82%
  - name: Q8_0
    filename: moonshine-tiny-uk-Q8_0.gguf
    size: 34 MB
    wer: 18.89%
