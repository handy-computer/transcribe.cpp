  date: 2026-05-11

# Upstream is the NVIDIA Open Model License (not a standard SPDX id), so
# the HF `license` field gets `other` and `license_name` / `license_link`
# carry the actual identifier + URL into the YAML frontmatter (HF prefers
# this when license=other). `license_display` is the human-facing form
# rendered in the README body.
license: other
license_name: nvidia-open-model-license
license_link: https://www.nvidia.com/en-us/agreements/enterprise-software/nvidia-open-model-license/
license_display: NVIDIA Open Model License
pipeline_tag: automatic-speech-recognition
languages:
  - en
tags:
  - gguf
  - transcribe.cpp
  - asr
  - speech-to-text
  - parakeet
  - conformer
  - rnnt
  - streaming
  - cache-aware

summary: |
  Offline English speech-to-text with punctuation and capitalization. A 0.6B-parameter cache-aware streaming FastConformer encoder with an RNN-T transducer decoder. Runs in offline mode. The encoder preserves the upstream att_context_size=[70, 13] (1.12s) cache-aware attention mask end-to-end. transcribe.cpp does not yet expose a streaming session API.

default_quant_index: 2  # Q8_0

wer:
  source: LibriSpeech test-clean, offline
  notes: |
    WER measured on the full LibriSpeech test-clean split (2620 utterances) with greedy RNN-T decoding. F32 reference baseline: 2.31%. NVIDIA's self-reported number on the same split at att_context_size=[70, 13] (1.12s chunk, w/o PnC) is 2.32%.

