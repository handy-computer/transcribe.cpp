# Spec for the HF README of handy-computer/moonshine-base-ja-gguf.
# Consumed by scripts/hf_cards/generate.py.

hf_repo: UsefulSensors/moonshine-base-ja
target_repo: handy-computer/moonshine-base-ja-gguf
transcribe_docs_url: https://github.com/handy-computer/transcribe.cpp/blob/main/docs/models/moonshine.md

upstream_commit: f9d4e6a
pin_date: 2026-05-12

validation:
  reference: transformers
  commit: 90bf720
  date: 2026-05-12

license: mit
license_display: MIT
pipeline_tag: automatic-speech-recognition
languages:
  - ja
tags:
  - gguf
  - transcribe.cpp
  - asr
  - speech-to-text
  - moonshine
  - useful-sensors
  - encoder-decoder

summary: |
  UsefulSensors' Moonshine base fine-tuned on Japanese. Same
  encoder-decoder transformer architecture as moonshine-base (62M
  parameters): consumes 16 kHz raw PCM via a three-layer Conv1d stem (no
  STFT, no mel filterbank) and emits transcript-only output. Single-language
  (ja); no translation, no language detection, no timestamps.

default_quant_index: 2  # Q8_0

metric: CER
# Capability flags for the transcribe_cpp metadata block.
capabilities:
  streaming: false
  translate: false
  lang_detect: false
  timestamps: none  # none | segment | word | token

# Perf inherited from moonshine-base (identical architecture; per-
# language RTF not separately benched).
perf:
  m4-max:
    metal: 79.5
    cpu: 80.5
  ryzen-4750u:
    vulkan: 34.5
    cpu: 22

wer:
  metadata_key: fleurs_ja
  source: FLEURS ja test
  notes: |
    CER measured on the FLEURS-ja test split (650
    utterances) using the transcribe.cpp default decode (greedy,
    num_beams=1, max_length=192 — matching the upstream generation_config).

    UsefulSensors does not publish a per-language CER number
    for this variant. As a comparable baseline we ran the Transformers F32
    reference (`MoonshineForConditionalGeneration`, fp32 on MPS) on the
    same manifest: **10.69% CER**. The C++ F32/F16 numbers
    above match the reference within bootstrap-CI noise; Q8_0 introduces
    a small additional drift from F16 (typically within 0.1pp).

quants:
  - name: F32
    filename: moonshine-base-ja-F32.gguf
    size: 236 MB
    wer: 10.84%
  - name: F16
    filename: moonshine-base-ja-F16.gguf
    size: 126 MB
    wer: 10.81%
  - name: Q8_0
    filename: moonshine-base-ja-Q8_0.gguf
    size: 74 MB
    wer: 10.53%
