# Spec for the HF README of handy-computer/qwen3-asr-1.7b-gguf.
# Consumed by scripts/hf_cards/generate.py.

hf_repo: Qwen/Qwen3-ASR-1.7B
target_repo: handy-computer/qwen3-asr-1.7b-gguf
transcribe_docs_url: https://github.com/handy-computer/transcribe.cpp/blob/main/docs/models/qwen3-asr-1.7b.md

upstream_commit: 7278e1e70fe206f11671096ffdd38061171dd6e5
pin_date: 2026-04-19

# Validation pin for the most recent upload. Updated on each release —
# older HF revisions carry whatever value was current at their upload time.
validation:
  reference: qwen_asr 0.0.6
  commit: 3f61df7
  date: 2026-04-20

license: apache-2.0
license_display: Apache-2.0
pipeline_tag: automatic-speech-recognition
languages:
  - zh
  - en
  - yue
  - ar
  - de
  - fr
  - es
  - pt
  - id
  - it
  - ko
  - ru
  - th
